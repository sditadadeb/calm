# Render Blueprint - Banco de Occidente Admin Dashboard
# Deploy automático: conectar repo en render.com > New Blueprint Instance
databases:
  # ── PostgreSQL persistente ─────────────────────────────────────────────────
  - name: banco-occidente-db
    plan: basic-256mb
    databaseName: banco_occidente
    user: banco_occidente_user

services:
  # ── Backend (Spring Boot via Docker) ──────────────────────────────────────
  - type: web
    name: banco-occidente-api
    runtime: docker
    dockerfilePath: ./calm-admin/backend/Dockerfile
    dockerContext: ./calm-admin/backend
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # DB — inyectada automáticamente desde banco-occidente-db
      - key: DB_HOST
        fromDatabase:
          name: banco-occidente-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: banco-occidente-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: banco-occidente-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: banco-occidente-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: banco-occidente-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AWS_S3_METADATA_ACCESS_KEY
        sync: false
      - key: AWS_S3_METADATA_SECRET_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_ACCESS_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ── Frontend (Vite/React Static Site) ─────────────────────────────────────
  - type: web
    name: banco-occidente-frontend
    runtime: static
    rootDir: ./calm-admin/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
