# Render Blueprint - ISL Admin (con PostgreSQL)
# Conectar repo desde GitHub y usar branch ISL
databases:
  - name: isl-db
    databaseName: isl_admin
    user: isl_admin
    plan: free

services:
  - type: web
    name: isl-admin-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: isl-db
          property: connectionString
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: Admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AWS_S3_METADATA_ACCESS_KEY
        sync: false
      - key: AWS_S3_METADATA_SECRET_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_ACCESS_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /actuator/health

  - type: web
    name: isl-admin-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
