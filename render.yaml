# Render Blueprint - Banco de Occidente Admin Dashboard
# Deploy automático: conectar repo en render.com > New Blueprint Instance
services:
  # ── Backend (Spring Boot via Docker) ──────────────────────────────────────
  - type: web
    name: banco-occidente-api
    runtime: docker
    dockerfilePath: ./calm-admin/backend/Dockerfile
    dockerContext: ./calm-admin/backend
    plan: free
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AWS_S3_METADATA_ACCESS_KEY
        sync: false
      - key: AWS_S3_METADATA_SECRET_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_ACCESS_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ── Frontend (Vite/React Static Site) ─────────────────────────────────────
  - type: web
    name: banco-occidente-frontend
    runtime: static
    rootDir: ./calm-admin/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
