# Render Blueprint - Carrefour Banco Analytics (PostgreSQL)
# Conectar repo desde GitHub y usar branch carrefour
# La DB se reutiliza de una existente: pegar DATABASE_URL manualmente.
services:
  - type: web
    name: carrefour-admin-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_TOOL_OPTIONS
        value: -XX:+UseSerialGC -XX:MaxRAMPercentage=70 -Dfile.encoding=UTF-8
      - key: ADMIN_USERNAME
        value: Admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIEWER_USERNAME
        value: viewer
      - key: VIEWER_PASSWORD
        sync: false
      - key: AWS_S3_METADATA_ACCESS_KEY
        sync: false
      - key: AWS_S3_METADATA_SECRET_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_ACCESS_KEY
        sync: false
      - key: AWS_S3_TRANSCRIPTIONS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_METADATA_BUCKET
        value: carrefour-grabaciones
      - key: AWS_TRANSCRIPTIONS_BUCKET
        value: carrefour-grabaciones
      - key: AWS_METADATA_PREFIX
        value: 48100171/
      - key: AWS_TRANSCRIPTIONS_PREFIX
        value: 48100171/
      - key: AWS_TRANSCRIPTIONS_ID_PREFIX
        value: ""
      - key: AWS_TRANSCRIPTIONS_ID_SUFFIX
        value: /transcripcion.json
      - key: AWS_METADATA_AUDIO_SUFFIX
        value: /archive.mp4
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /actuator/health

  - type: web
    name: carrefour-admin-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
