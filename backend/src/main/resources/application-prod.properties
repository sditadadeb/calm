# ===========================================
# CALM Admin - Production Configuration
# ===========================================
# ALL SENSITIVE VALUES MUST BE SET AS ENVIRONMENT VARIABLES!
# Never commit real credentials to version control.
# ===========================================

# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# Render: DATABASE_URL viene de la PostgreSQL (formato postgres:// o postgresql://).
# Si no hay DATABASE_URL, se usa H2 en archivo (fallback).
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/isl_admin_prod}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
# Render/PostgreSQL: set SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# DISABLE H2 Console in Production!
spring.h2.console.enabled=false

# AWS S3 - Metadata / grabaciones (configurar con tus buckets)
aws.s3.metadata.bucket=${AWS_METADATA_BUCKET:carrefour-grabaciones}
aws.s3.metadata.region=${AWS_REGION:us-east-1}
aws.s3.metadata.accessKeyId=${AWS_S3_METADATA_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
aws.s3.metadata.secretAccessKey=${AWS_S3_METADATA_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
aws.s3.metadata.prefix=${AWS_METADATA_PREFIX:48100171/}
aws.s3.metadata.audioSuffix=${AWS_METADATA_AUDIO_SUFFIX:/archive.mp4}

# AWS S3 - Transcripciones (transcripciones/*.json)
aws.s3.transcriptions.bucket=${AWS_TRANSCRIPTIONS_BUCKET:carrefour-grabaciones}
aws.s3.transcriptions.region=${AWS_REGION:us-east-1}
aws.s3.transcriptions.accessKeyId=${AWS_S3_TRANSCRIPTIONS_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
aws.s3.transcriptions.secretAccessKey=${AWS_S3_TRANSCRIPTIONS_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
aws.s3.transcriptions.prefix=${AWS_TRANSCRIPTIONS_PREFIX:48100171/}
aws.s3.transcriptions.idPrefix=${AWS_TRANSCRIPTIONS_ID_PREFIX:}
aws.s3.transcriptions.idSuffix=${AWS_TRANSCRIPTIONS_ID_SUFFIX:/transcripcion.json}

# OpenAI Configuration (FROM ENVIRONMENT VARIABLE)
openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL:gpt-5.2}

# CORS - Set your production domain
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# JWT Configuration (FROM ENVIRONMENT VARIABLE - MUST BE STRONG!)
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin User (FROM ENVIRONMENT VARIABLES)
admin.username=${ADMIN_USERNAME:Admin}
admin.password=${ADMIN_PASSWORD}
viewer.username=${VIEWER_USERNAME:viewer}
viewer.password=${VIEWER_PASSWORD}

# Rate Limiting
rate.limit.login.attempts=${RATE_LIMIT_LOGIN:5}
rate.limit.login.duration=${RATE_LIMIT_DURATION:60}

# Actuator: solo health (pentest: no exponer info ni endpoints)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Logging - Don't expose stack traces
server.error.include-stacktrace=never
server.error.include-message=never
logging.level.root=WARN
logging.level.com.calm.admin=INFO
