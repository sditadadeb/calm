# ===========================================
# ISL Admin - Development Configuration
# ===========================================
# For production, use application-prod.properties with environment variables
# ===========================================

# Server Configuration
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:file:./data/isl_admin;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# AWS S3 - Bucket de metadata/grabaciones (ej.: isl-grabaciones o el que uses)
aws.s3.metadata.bucket=${AWS_METADATA_BUCKET:isl-grabaciones}
aws.s3.metadata.region=${AWS_REGION:us-east-1}
aws.s3.metadata.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.s3.metadata.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.s3.metadata.prefix=${AWS_METADATA_PREFIX:48100171/}
# Sufijo del archivo de audio en cada carpeta de atención (ej: /archive.mp4 o .webm)
aws.s3.metadata.audioSuffix=${AWS_METADATA_AUDIO_SUFFIX:/archive.mp4}

# AWS S3 - Bucket de transcripciones (puede ser el mismo u otro)
# Rutas Carrefour Banco: 48100171/{recordingId}/transcripcion.json
aws.s3.transcriptions.bucket=${AWS_TRANSCRIPTIONS_BUCKET:isl-grabaciones}
aws.s3.transcriptions.region=${AWS_REGION:us-east-1}
aws.s3.transcriptions.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.s3.transcriptions.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.s3.transcriptions.prefix=${AWS_TRANSCRIPTIONS_PREFIX:48100171/}
# Clave del archivo: prefix + idPrefix + recordingId + idSuffix
# Carrefour Banco: idPrefix vacío, idSuffix=/transcripcion.json
aws.s3.transcriptions.idPrefix=${AWS_TRANSCRIPTIONS_ID_PREFIX:}
aws.s3.transcriptions.idSuffix=${AWS_TRANSCRIPTIONS_ID_SUFFIX:/transcripcion.json}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.2}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:3000,https://calm-demo.loca.lt}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JWT Configuration
jwt.secret=${JWT_SECRET:calm-admin-dev-secret-key-change-in-production-must-be-at-least-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin User
# En producción definir ADMIN_USERNAME y ADMIN_PASSWORD por variable de entorno
admin.username=${ADMIN_USERNAME:Admin}
admin.password=${ADMIN_PASSWORD:Numi@2026!}

# Rate Limiting
rate.limit.login.attempts=${RATE_LIMIT_LOGIN:5}
rate.limit.login.duration=${RATE_LIMIT_DURATION:60}
