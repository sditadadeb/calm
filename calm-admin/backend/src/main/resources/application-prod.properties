# ===========================================
# Banco de Occidente Admin - Production Configuration
# ===========================================
# ALL SENSITIVE VALUES MUST BE SET AS ENVIRONMENT VARIABLES!
# Never commit real credentials to version control.
# ===========================================

# Server
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────
# Option A: Render PostgreSQL (recommended for persistence)
#   Set SPRING_DATASOURCE_URL=jdbc:postgresql://host:port/dbname
#   Set DATABASE_USERNAME and DATABASE_PASSWORD
# Option B: H2 in-memory (default - data resets on restart)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:banco_occidente_prod;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Disable H2 console in production
spring.h2.console.enabled=false

# ── AWS S3 ────────────────────────────────────────────────────────────────
aws.s3.metadata.bucket=vonage-pruebas
aws.s3.metadata.region=us-east-1
aws.s3.metadata.accessKeyId=${AWS_S3_METADATA_ACCESS_KEY}
aws.s3.metadata.secretAccessKey=${AWS_S3_METADATA_SECRET_KEY}
aws.s3.metadata.prefix=in-person-recording/

aws.s3.transcriptions.bucket=poc-video-aws
aws.s3.transcriptions.region=us-east-1
aws.s3.transcriptions.accessKeyId=${AWS_S3_TRANSCRIPTIONS_ACCESS_KEY}
aws.s3.transcriptions.secretAccessKey=${AWS_S3_TRANSCRIPTIONS_SECRET_KEY}
aws.s3.transcriptions.prefix=calm/transcripciones/

# ── OpenAI ────────────────────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL:gpt-4o-mini}

# ── CORS ──────────────────────────────────────────────────────────────────
# Set to your Render frontend URL, e.g.: https://banco-occidente-frontend.onrender.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://banco-occidente-frontend.onrender.com}

# ── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Admin user ────────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD}

# ── Rate limiting ─────────────────────────────────────────────────────────
rate.limit.login.attempts=${RATE_LIMIT_LOGIN:5}
rate.limit.login.duration=${RATE_LIMIT_DURATION:60}

# ── Logging ───────────────────────────────────────────────────────────────
server.error.include-stacktrace=never
server.error.include-message=never
logging.level.root=WARN
logging.level.com.bancooccidente.admin=INFO

# ── Jackson ───────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
